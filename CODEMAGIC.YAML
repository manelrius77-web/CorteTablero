workflows:
  android-workflow:
    name: Android build
    instance_type: mac_mini_m2
    max_build_duration: 120
    scripts:
      - npm install
      - npx expo export --platform android
  ios-workflow:
    name: iOS build
    instance_type: mac_mini_m2
    max_build_duration: 120
    scripts:
      - npm install
      - npx expo export --platform ios
